# =============================================================
# PECE Platform — Nginx Configuration
# =============================================================
# Place at: /etc/nginx/sites-available/pece
# Symlink:  ln -s /etc/nginx/sites-available/pece /etc/nginx/sites-enabled/
#
# UPDATE: Replace YOUR_VM_IP with your actual GCP VM static IP.
# When you add a domain later, replace YOUR_VM_IP with your domain name.
# =============================================================

server {
    listen 80;
    server_name YOUR_VM_IP;

    root /var/www/html/wordpress;
    index index.php index.html;

    # Max upload size (matches PHP and WordPress settings)
    client_max_body_size 64M;

    # ---------------------------------------------------------
    # Cloudflare Real IP Configuration
    # UNCOMMENT these lines when you activate Cloudflare proxy.
    # This ensures Wordfence and WordPress see real visitor IPs
    # instead of Cloudflare's proxy IPs.
    # ---------------------------------------------------------
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;
    # real_ip_header CF-Connecting-IP;

    # ---------------------------------------------------------
    # WordPress permalink support
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ---------------------------------------------------------
    # PHP processing via PHP-FPM
    # ---------------------------------------------------------
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts for long-running operations (backups, imports)
        fastcgi_read_timeout 300;
    }

    # ---------------------------------------------------------
    # Security: deny access to sensitive files
    # ---------------------------------------------------------
    location ~ /\.ht {
        deny all;
    }

    location ~ /wp-config\.php {
        deny all;
    }

    location ~ /xmlrpc\.php {
        deny all;
    }

    # Block access to WordPress debug log
    location ~ /wp-content/debug\.log {
        deny all;
    }

    # ---------------------------------------------------------
    # Static asset caching
    # ---------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------
    # WP Super Cache integration (optional, improves cache hits)
    # ---------------------------------------------------------
    set $cache_uri $request_uri;

    # Don't cache POST requests
    if ($request_method = POST) {
        set $cache_uri 'null cache';
    }

    # Don't cache if query string present
    if ($query_string != "") {
        set $cache_uri 'null cache';
    }

    # Don't cache WordPress admin or login
    if ($request_uri ~* "(/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml)") {
        set $cache_uri 'null cache';
    }

    # Don't cache for logged-in users or commenters
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
        set $cache_uri 'null cache';
    }
}
